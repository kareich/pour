name: EAS Build

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'packages/shared/**'
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        default: development
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: Platform
        required: true
        default: all
        type: choice
        options:
          - all
          - ios
          - android

jobs:
  build:
    name: EAS Build (${{ github.event.inputs.profile || 'development' }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build (development)
        if: github.event_name == 'push' || github.event.inputs.profile == 'development'
        working-directory: apps/mobile
        run: eas build --profile development --platform ${{ github.event.inputs.platform || 'all' }} --non-interactive

      - name: Build (custom profile)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.profile != 'development'
        working-directory: apps/mobile
        run: eas build --profile ${{ github.event.inputs.profile }} --platform ${{ github.event.inputs.platform }} --non-interactive
