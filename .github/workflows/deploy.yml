name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/workers/**'
      - 'packages/db/**'
      - 'packages/shared/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        default: 'api'
        type: choice
        options:
          - api
          - workers
          - both

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Railway auto-deploys on push — no webhook trigger needed.
  # Migrations run inside the Railway start command (see railway.json).
  # This job exists for manual workflow_dispatch or future platform changes.
  notify-deploy:
    name: Deployment triggered
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Log deploy
        run: echo "Railway will auto-deploy from the push to main."
