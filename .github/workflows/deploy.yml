name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/workers/**'
      - 'packages/db/**'
      - 'packages/shared/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        default: 'api'
        type: choice
        options:
          - api
          - workers
          - both

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-api:
    name: Deploy API to Render
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.target == 'api' || inputs.target == 'both') ||
      github.event_name == 'push'
    steps:
      - name: Trigger Render API deploy
        run: |
          curl -X POST "${{ secrets.RENDER_API_DEPLOY_HOOK }}" \
            --fail \
            --silent \
            --show-error

  deploy-workers:
    name: Deploy Workers to Render
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.target == 'workers' || inputs.target == 'both') ||
      github.event_name == 'push'
    steps:
      - name: Trigger Render Workers deploy
        run: |
          curl -X POST "${{ secrets.RENDER_WORKERS_DEPLOY_HOOK }}" \
            --fail \
            --silent \
            --show-error

  run-migrations:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: [deploy-api]
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.target == 'api' || inputs.target == 'both') ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9.15.6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter @pour/db db:migrate:deploy
