name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-api:
    name: Deploy API to Render
    runs-on: ubuntu-latest
    if: |
      contains(github.event.commits[0].modified, 'apps/api/') ||
      contains(github.event.commits[0].modified, 'packages/db/') ||
      contains(github.event.commits[0].modified, 'packages/shared/')
    steps:
      - name: Trigger Render API deploy
        run: |
          curl -X POST "${{ secrets.RENDER_API_DEPLOY_HOOK }}" \
            --fail \
            --silent \
            --show-error

  deploy-workers:
    name: Deploy Workers to Render
    runs-on: ubuntu-latest
    if: |
      contains(github.event.commits[0].modified, 'apps/workers/') ||
      contains(github.event.commits[0].modified, 'packages/db/') ||
      contains(github.event.commits[0].modified, 'packages/shared/')
    steps:
      - name: Trigger Render Workers deploy
        run: |
          curl -X POST "${{ secrets.RENDER_WORKERS_DEPLOY_HOOK }}" \
            --fail \
            --silent \
            --show-error

  run-migrations:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: [deploy-api]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter @pour/db db:migrate:deploy
