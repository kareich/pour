databases:
  - name: pour-db
    databaseName: pour
    user: pour
    plan: starter

services:
  - type: redis
    name: pour-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: pour-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm run build
    preDeployCommand: pnpm --filter @pour/db db:migrate:deploy
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: pour-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pour-redis
          type: redis
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: TYPESENSE_HOST
        sync: false
      - key: TYPESENSE_API_KEY
        sync: false
      - key: TYPESENSE_PROTOCOL
        value: https
      - key: GOOGLE_CLOUD_VISION_API_KEY
        sync: false
      - key: CLOUDFLARE_R2_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_R2_ACCESS_KEY_ID
        sync: false
      - key: CLOUDFLARE_R2_SECRET_ACCESS_KEY
        sync: false
      - key: CLOUDFLARE_R2_BUCKET
        sync: false
      - key: CLOUDFLARE_R2_PUBLIC_URL
        sync: false
